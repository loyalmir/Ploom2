<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문화부 집회 주간 식수 인원 파악</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --surface: #fffdf7;
    --border: #d6c9a8;
    --accent: #c8783a;
    --accent-light: #f0dcc0;
    --text: #2c2416;
    --text-sub: #7a6a50;
    --male-header: #b8d0e8;
    --female-header: #f5c8c8;
    --row-hover: rgba(200,120,58,0.07);
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding: 24px 16px 60px;
    color: var(--text);
  }

  h1 {
    text-align: center;
    font-size: 1.25rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 20px;
    color: var(--text);
  }

  .summary-bar {
    display: flex;
    gap: 8px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .summary-card {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 8px 16px;
    text-align: center;
    min-width: 60px;
  }
  .summary-card .day-label { font-size: 0.7rem; color: var(--text-sub); margin-bottom: 2px; }
  .summary-card .day-count { font-size: 1.3rem; font-weight: 700; color: var(--accent); }

  .table-section {
    background: var(--surface);
    border-radius: 14px;
    border: 1.5px solid var(--border);
    overflow: hidden;
    margin-bottom: 16px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }

  .section-header {
    padding: 10px 16px;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.05em;
    color: var(--text-sub);
  }
  .section-header.male { background: var(--male-header); }
  .section-header.female { background: var(--female-header); }

  table { width: 100%; border-collapse: collapse; }

  thead th {
    padding: 8px 4px;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--text-sub);
    border-bottom: 1.5px solid var(--border);
    text-align: center;
  }
  thead th.name-col { text-align: left; padding-left: 14px; width: 100px; }

  tbody tr {
    border-bottom: 1px solid #ede6d6;
    transition: background 0.15s;
  }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--row-hover); }

  td {
    padding: 9px 4px;
    text-align: center;
    font-size: 0.82rem;
  }
  td.name-cell {
    text-align: left;
    padding-left: 14px;
    font-weight: 500;
    white-space: nowrap;
  }
  tr.intro-row td.name-cell {
    color: var(--text-sub);
    font-size: 0.78rem;
    padding-left: 24px;
  }

  .check-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1.5px solid var(--border);
    background: transparent;
    cursor: pointer;
    font-size: 1rem;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    transition: 
      background-color 0.15s,
      border-color 0.15s,
      transform 0.15;
    color: transparent;
  }
  .check-btn.checked {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }
  .check-btn:active { transform: scale(0.92); }

  /* 액션 셀 - 삭제 + 소개추가 버튼 */
  .action-cell {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    padding-right: 4px;

    width: 90px;
    min-width: 90px;
  }
  .delete-btn {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    border: none;
    background: #f0c0c0;
    color: #a03030;
    font-size: 0.75rem;
    cursor: pointer;
    
    display: inline-flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    
    transition: 
      opacity 0.15,
      background 0.15;
  }
  .delete-btn:hover { 
    background: #e09090; }
  { 
    opacity: 1;
    visibility: visible; }

.intro-add-btn {
  font-size: 0.68rem;
  padding: 3px 6px;
  border-radius: 6px;
  border: 1px dashed var(--border);
  background: none;
  color: var(--text-sub);
  cursor: pointer;
  white-space: nowrap;

  display: inline-flex;
 
  transition:
    opacity 0.15s,
    background 0.15s,
    border-color 0.15s;

}
.intro-add-btn:hover {
  background: var(--accent-light);
  border-color: var(--accent);
  color: var(--accent);
}
{
  opacity: 1;
  visibility: visible;
}
  /* 소개 추가 인풋 (인라인) */
  .intro-input-row td {
    padding: 6px 8px 6px 28px;
    background: #f8f4ec;
  }
  .intro-input-wrap {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .intro-input-wrap input {
    flex: 1;
    padding: 5px 8px;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    font-family: inherit;
    font-size: 0.78rem;
    background: white;
    color: var(--text);
    outline: none;
  }
  .intro-input-wrap input:focus { border-color: var(--accent); }
  .intro-confirm-btn {
    padding: 5px 10px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 7px;
    font-family: inherit;
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
  }
  .intro-cancel-btn {
    padding: 5px 8px;
    background: none;
    color: var(--text-sub);
    border: 1px solid var(--border);
    border-radius: 7px;
    font-family: inherit;
    font-size: 0.78rem;
    cursor: pointer;
  }

  .add-row {
    padding: 10px 12px;
    display: flex;
    gap: 8px;
    border-top: 1px dashed var(--border);
  }
  .add-row input {
    flex: 1;
    padding: 7px 10px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.82rem;
    background: var(--bg);
    color: var(--text);
    outline: none;
  }
  .add-row input:focus { border-color: var(--accent); }
  .add-row button {
    padding: 7px 14px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
  }
  .add-row button:hover { background: #a85f25; }

  #loading {
    text-align: center;
    padding: 40px;
    color: var(--text-sub);
    font-size: 0.85rem;
  }

  @media (max-width: 480px) {
    .check-btn { width: 28px; height: 28px; font-size: 0.9rem; }
    td { padding: 8px 2px; }
    td.name-cell { padding-left: 10px; font-size: 0.78rem; }
  }
</style>
</head>
<body>

<h1>문화부 집회 주간 식수 인원 파악</h1>

<div class="summary-bar">
  <div class="summary-card"><div class="day-label">월</div><div class="day-count" id="sum-0">-</div></div>
  <div class="summary-card"><div class="day-label">화</div><div class="day-count" id="sum-1">-</div></div>
  <div class="summary-card"><div class="day-label">수</div><div class="day-count" id="sum-2">-</div></div>
  <div class="summary-card"><div class="day-label">목</div><div class="day-count" id="sum-3">-</div></div>
  <div class="summary-card"><div class="day-label">금</div><div class="day-count" id="sum-4">-</div></div>
</div>

<div id="loading">데이터 불러오는 중...</div>
<div id="mainContent" style="display:none">

  <div class="table-section">
    <div class="section-header male">👨 형제</div>
    <table>
      <thead>
        <tr>
          <th class="name-col">이름</th>
          <th>월</th><th>화</th><th>수</th><th>목</th><th>금</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="maleBody"></tbody>
    </table>
    <div class="add-row">
      <input type="text" id="maleInput" placeholder="이름 입력" maxlength="10">
      <button onclick="addPerson('male')">추가</button>
    </div>
  </div>

  <div class="table-section">
    <div class="section-header female">👩 자매</div>
    <table>
      <thead>
        <tr>
          <th class="name-col">이름</th>
          <th>월</th><th>화</th><th>수</th><th>목</th><th>금</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="femaleBody"></tbody>
    </table>
    <div class="add-row">
      <input type="text" id="femaleInput" placeholder="이름 입력" maxlength="10">
      <button onclick="addPerson('female')">추가</button>
    </div>
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const app = initializeApp({ databaseURL: "https://k-hary-default-rtdb.firebaseio.com/" });
const db = getDatabase(app);
const DB_PATH = "siksu/main";
const DAYS = ['월','화','수','목','금'];

let data = { male: [], female: [] };

const DEFAULT_MALE = [
  {name:'김동언',intro:false},{name:'이재열',intro:false},{name:'문정대',intro:false},
  {name:'김건하',intro:false},{name:'선세은',intro:true},{name:'김태윤',intro:false},
  {name:'박인국',intro:false},{name:'조한영',intro:true},{name:'정찬원',intro:false},
  {name:'박정민',intro:false},{name:'서보현',intro:false},{name:'신민기',intro:false},
  {name:'이승욱',intro:true},{name:'안병철',intro:false},{name:'조대희',intro:false},
  {name:'김상우',intro:false},{name:'이승호',intro:false},{name:'임준혁',intro:false}
];
const DEFAULT_FEMALE = [
  {name:'하연서',intro:false},{name:'이애령',intro:false},{name:'고연희',intro:false},
  {name:'홍정인',intro:false},{name:'박규리',intro:false},{name:'백선우',intro:false},
  {name:'박예정',intro:false},{name:'양은솔',intro:false},{name:'문보람',intro:false},
  {name:'주희중',intro:true},{name:'신현영',intro:false},{name:'김민선',intro:false},
  {name:'이승연',intro:false}
];

function makePerson(name, intro=false) {
  return { name, intro, days: [false,false,false,false,false] };
}

async function loadData() {
  const snap = await get(ref(db, DB_PATH));
  if (snap.exists()) {
    data = snap.val();
    // days 배열 보정 (혹시 null 있으면)
    ['male','female'].forEach(g => {
      (data[g]||[]).forEach(p => { if(!p.days) p.days=[false,false,false,false,false]; });
    });
  } else {
    data = {
      male: DEFAULT_MALE.map(p => makePerson(p.name, p.intro)),
      female: DEFAULT_FEMALE.map(p => makePerson(p.name, p.intro))
    };
    await set(ref(db, DB_PATH), data);
  }
  render();
  document.getElementById('loading').style.display = 'none';
  document.getElementById('mainContent').style.display = 'block';
}

function saveData() { set(ref(db, DB_PATH), data); }

function render() {
  renderGroup('male', 'maleBody');
  renderGroup('female', 'femaleBody');
  updateSummary();
}

// 소개 추가 인풋이 열려있는 idx 추적
let introOpenState = { male: -1, female: -1 };

function renderGroup(group, tbodyId) {
  const tbody = document.getElementById(tbodyId);
  tbody.innerHTML = '';
  (data[group]||[]).forEach((person, idx) => {
    // 일반 행
    const tr = document.createElement('tr');
    if (person.intro) tr.classList.add('intro-row');

    // 이름 셀
    const nameTd = document.createElement('td');
    nameTd.className = 'name-cell';
    nameTd.textContent = person.intro ? `↳ ${person.name}` : person.name;
    tr.appendChild(nameTd);

    // 요일 체크
    DAYS.forEach((_, di) => {
      const td = document.createElement('td');
      const btn = document.createElement('button');
      btn.className = 'check-btn' + (person.days[di] ? ' checked' : '');
      btn.textContent = person.days[di] ? '○' : '';
      btn.onclick = () => { toggleDay(group, idx, di); };
      td.appendChild(btn);
      tr.appendChild(td);
    });

    // 액션 셀
    const actTd = document.createElement('td');
    const actDiv = document.createElement('div');
    actDiv.className = 'action-cell';

    // 소개로 추가 버튼 (소개행 아닌 경우만)
    if (!person.intro) {
      const introBtn = document.createElement('button');
      introBtn.className = 'intro-add-btn';
      introBtn.textContent = '↳소개';
      introBtn.onclick = (e) => {
        e.stopPropagation();
        introOpenState[group] = idx;
        render();
      };
      actDiv.appendChild(introBtn);
    }

    // 삭제 버튼
    const delBtn = document.createElement('button');
    delBtn.className = 'delete-btn';
    delBtn.textContent = '×';
    delBtn.onclick = () => deletePerson(group, idx);
    actDiv.appendChild(delBtn);

    actTd.appendChild(actDiv);
    tr.appendChild(actTd);
    tbody.appendChild(tr);

    // 소개 추가 인풋 행 (해당 idx 바로 아래)
    if (!person.intro && introOpenState[group] === idx) {
      const inputTr = document.createElement('tr');
      inputTr.className = 'intro-input-row';
      const inputTd = document.createElement('td');
      inputTd.colSpan = 7;

      const wrap = document.createElement('div');
      wrap.className = 'intro-input-wrap';

      const inp = document.createElement('input');
      inp.type = 'text';
      inp.placeholder = `${person.name}의 소개 이름`;
      inp.maxLength = 10;
      inp.autofocus = true;

      const confirmBtn = document.createElement('button');
      confirmBtn.className = 'intro-confirm-btn';
      confirmBtn.textContent = '추가';
      confirmBtn.onclick = () => {
        const name = inp.value.trim();
        if (!name) return;
        data[group].splice(idx + 1, 0, makePerson(name, true));
        introOpenState[group] = -1;
        saveData();
        render();
      };

      const cancelBtn = document.createElement('button');
      cancelBtn.className = 'intro-cancel-btn';
      cancelBtn.textContent = '취소';
      cancelBtn.onclick = () => { introOpenState[group] = -1; render(); };

      inp.addEventListener('keydown', e => {
        if (e.key === 'Enter') confirmBtn.click();
        if (e.key === 'Escape') cancelBtn.click();
      });

      wrap.appendChild(inp);
      wrap.appendChild(confirmBtn);
      wrap.appendChild(cancelBtn);
      inputTd.appendChild(wrap);
      inputTr.appendChild(inputTd);
      tbody.appendChild(inputTr);

      setTimeout(() => inp.focus(), 50);
    }
  });
}

function toggleDay(group, idx, di) {
  data[group][idx].days[di] = !data[group][idx].days[di];
  saveData();
  render();
}

function updateSummary() {
  const all = [...(data.male||[]), ...(data.female||[])];
  DAYS.forEach((_, di) => {
    document.getElementById(`sum-${di}`).textContent = all.filter(p => p.days[di]).length;
  });
}

window.addPerson = function(group) {
  const inp = document.getElementById(group === 'male' ? 'maleInput' : 'femaleInput');
  const name = inp.value.trim();
  if (!name) return;
  if (!data[group]) data[group] = [];
  data[group].push(makePerson(name, false));
  inp.value = '';
  saveData();
  render();
};

window.deletePerson = function(group, idx) {
  const name = data[group][idx].name;
  if (!confirm(`"${name}" 을(를) 삭제할까요?`)) return;
  data[group].splice(idx, 1);
  saveData();
  render();
};

document.getElementById('maleInput').addEventListener('keydown', e => { if(e.key==='Enter') window.addPerson('male'); });
document.getElementById('femaleInput').addEventListener('keydown', e => { if(e.key==='Enter') window.addPerson('female'); });

loadData();
</script>
</body>
</html>
